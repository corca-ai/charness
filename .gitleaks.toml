title = "charness gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Ignore generated, vendored, and transient paths in charness"
paths = [
  '''(^|/)node_modules/''',
  '''(^|/)\.git/''',
  '''(^|/)\.pytest_cache/''',
  '''(^|/)\.lycheecache$''',
  '''(^|/)skill-outputs/''',
  '''(^|/)package-lock\.json$''',
  # Generated nose clone-family baseline: family `key`s are content-hash
  # fingerprints (16-hex), not secrets, but trip the generic-api-key rule.
  '''(^|/)charness-artifacts/quality/nose-baseline\.json$''',
]
