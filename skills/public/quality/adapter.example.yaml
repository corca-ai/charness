version: 1
repo: my-repo
language: en
output_dir: charness-artifacts/quality
preset_id: typescript-quality
customized_from: typescript-quality
preset_lineage:
- typescript-quality
coverage_fragile_margin_pp: 1.0
coverage_floor_policy:
  min_statements_threshold: 30
  fail_below_pct: 80.0
  warn_ceiling_pct: 95.0
  floor_drift_lock_pp: 1.0
  exemption_list_path: scripts/coverage-floor-exemptions.txt
  gate_script_pattern: *-quality-gate.sh
  lefthook_path: lefthook.yml
  ci_workflow_glob: .github/workflows/*.yml
specdown_smoke_patterns: []
spec_pytest_reference_format: Covered by pytest:\s+`tests/[^`]+`(?:,\s*`tests/[^`]+`)*
public_spec_section_exemptions:
  - Fixed Decisions
  - HTTP API contract
  - Server backend stack
  - Deferred Decisions
  - Non-Goals
public_spec_implementation_ref_density_floor: 0.02
public_spec_implementation_guard_min_lines: 100
public_spec_pointer_proof_markers:
  - "proof: pointer"
  - "proof: pointer-spec"
  - "executable_proof: pointer"
  - "public_spec_proof: pointer"
recommendation_defaults_version: issue-64
adapter_review_sources: []
acknowledged_recommendations: []
gate_design_review_globs: []
canonical_markdown_surfaces:
  - AGENTS.md
  - CLAUDE.md
skill_ergonomics_skill_paths: []
skill_ergonomics_runtime_install_skill_paths: []
vendored_paths: []
skill_ergonomics_gate_rules: []
runtime_profile_default: default
runtime_budgets: {}
runtime_budget_profiles: {}
startup_probes: []
quality_phases: []
concept_paths: []
preflight_commands: []
gate_commands: []
security_commands: []
mutation_testing:
  # Empty commands.* keep this stack-neutral; consumers fill the slots that
  # match their tool. See references/mutation-testing.md.
  commands:
    dry_run: ""
    full: ""
    sample: ""
    summary: ""
  score_break: 60
  schedule_cron: "17 */3 * * *"
  changed_quota: 5
  max_files: 10
  auto_issue:
    enabled: false
    label: mutation-test
    title: Mutation test regression on main
    marker_token: mutation-test-regression
  workflow_path: .github/workflows/mutation-tests.yml
  report_paths:
    summary_md: reports/mutation/summary.md
    sample_md: reports/mutation/sample.md
    log: reports/mutation/run.log
  declined: false
