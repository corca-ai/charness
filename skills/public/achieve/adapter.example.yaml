version: 1
repo: CHANGE_ME
language: en
artifact_dir: charness-artifacts/goals
closeout_publication:
  default_mode: audit-only
  issue_closeout_carrier: direct-commit
  require_draft_validation: true
  draft_validation_command_template: "python3 skills/public/issue/scripts/issue_tool.py validate-closeout-draft --repo-root . --repo {repo} --number {issue_number} --classification {classification} --carrier direct-commit --commit-message-file {commit_message_file}"
  require_post_publication_verify: true
  publish_requires_user_confirmation: true
auto_retro:
  disposition_floor: review-required
  allow_host_blocked_disposition_review_skip: true
  valid_dispositions:
    - applied
    - issue
  allow_none_optout: true
scaffold:
  draft_active_frame_lines:
    - "- Current slice: before activation."
    - "- Current slice intent: before activation. The reviewable-intent unit in progress"
    - "  and the commits it spans; critique and broad proof do not re-fire within one"
    - "  unchanged intent — update it when the intent changes, not per commit"
    - "  (meaningful-slice-cadence)."
    - "- Next action: activate with `/goal @{goal_rel}`."
    - "- Verification cadence: cheap deterministic checks at commit boundaries;"
    - "  higher-cost or fresh-eye proof at slice boundaries; final broad/live proof at"
    - "  closeout."
    - "- Gate cadence: pre-lock slices use `run_slice_closeout.py --skip-broad-pytest`;"
    - "  final/bundle proof records the verification lock and uses `--verification-lock`."
    - "- Slice review packet: before fresh-eye slice critique, provide intent, changed"
    - "  files and owning/generated surfaces, expected invariants, tests/proof,"
    - "  non-claims, out-of-scope lines, and reviewer questions."
    - "- History boundary: keep this frame current; move completed detail to"
    - "  `## Slice Log`, `## Final Verification`, and `## Auto-Retro`."
