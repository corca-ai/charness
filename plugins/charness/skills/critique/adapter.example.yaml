version: 1
repo: CHANGE_ME
language: en
output_dir: charness-artifacts/critique
# Host-specific translation of the portable reviewer tiers defined in
# skills/shared/references/fresh-eye-subagent-review.md. The portable policy
# names only the tier; each host maps it to that host's strongest reviewer.
# Set the values for the host this repo runs on. Known host defaults:
#   Codex host:        high-leverage -> model: gpt-5.5,
#                        reasoning_effort: medium, service_tier: priority
#   Claude Code host:  high-leverage -> model: sonnet-4.6
# reasoning_effort / service_tier only apply where the host exposes them.
reviewer_tiers:
  high-leverage:
    model: gpt-5.5
    reasoning_effort: medium
    service_tier: priority
packet_sections:
  - id: changed-files-and-owning-surfaces
    title: Changed Files And Owning Surfaces
    content_kind: script
    command: "python3 scripts/render_critique_section_changed_surfaces.py"
  - id: known-deferred-concerns
    title: Known Deferred Concerns
    content_kind: static
    content_path: docs/deferred-decisions.md
  - id: non-goals
    title: Non-Goals For This Critique
    content_kind: static
    # Inline `content` accepts a string or a list of strings (one per
    # line). Block scalars (`|`) are not supported by the repo-local
    # YAML loader.
    content:
      - "- example non-goal one"
      - "- example non-goal two"
