# charness usage-episodes adapter: opt in explicitly before runtime capture.
# Runtime JSONL under .charness/usage-episodes is generated local state and is
# ignored by git. Keep disabled until maintainers intentionally opt into local
# runtime capture for the implemented emitter path.
version: 1
repo: charness
enabled: false
storage_path: .charness/usage-episodes
events:
  - usage_episode
privacy:
  raw_prompt: false
  raw_transcript: false
  user_identity: none
rotation:
  max_files: 10
  max_size_mb: 10
