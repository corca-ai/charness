# charness usage-episodes adapter: maintainers have opted into local runtime
# capture for the implemented emitter path. Runtime JSONL under
# .charness/usage-episodes is generated local state and is ignored by git.
version: 1
repo: charness
enabled: true
storage_path: .charness/usage-episodes
events:
  - usage_episode
privacy:
  raw_prompt: false
  raw_transcript: false
  user_identity: none
rotation:
  max_files: 10
  max_size_mb: 10
# host_hooks installs a SessionStart hook into the named host's settings via
# `charness init`/`charness update`. Set a host to `disabled` and re-run
# `charness update` (or `charness session-capture uninstall --host <host>`)
# to remove the hook.
# Claude target: ~/.claude/settings.json (`hooks.SessionStart`).
# Codex target: ~/.codex/config.toml unless ~/.codex/hooks.json already carries
# hook entries on the user layer, in which case charness installs to hooks.json
# instead to honor the Codex "one representation per layer" guidance.
host_hooks:
  claude: enabled
  codex: enabled
