version: 1
repo: charness
evaluation_surfaces:
  - skill portability and metadata integrity
  - repo-owned validation workflow
baseline_options:
  - compare against a git ref in the same repo via {baseline_ref}
required_prerequisites:
  - install Python and Node dependencies before running repo quality gates
preflight_commands:
  - python3 scripts/validate-adapters.py --repo-root .
full_gate_command_templates:
  - ./scripts/run-quality.sh
artifact_paths:
  - docs/master-plan.md
  - docs/public-skill-validation.md
  - skill-outputs/quality/quality.md
report_paths:
  - skill-outputs/quality/quality.md
comparison_questions:
  - Which portability, validation, or packaging guarantees improved or regressed?
human_review_prompts:
  - id: portability
    prompt: Where would a host repo still find charness brittle or unclear despite green repo-owned gates?
profile_default: engineering-quality
