version: 1
repo: charness
language: en
output_dir: charness-artifacts/critique
reviewer_tiers:
  high-leverage:
    model: gpt-5.5
    reasoning_effort: medium
    service_tier: priority
# Declared sections opt this repo into the critique prepare-packet
# contract. See skills/public/critique/references/prepare-packet.md.
packet_sections:
  - id: changed-files-and-owning-surfaces
    title: Changed Files And Owning Surfaces
    content_kind: script
    command: "python3 scripts/render_critique_section_changed_surfaces.py"
  - id: critique-prepare-non-goals
    title: Non-Goals For This Contract
    content_kind: static
    # Inline content uses a list of strings (one per line) because the
    # repo-local YAML loader does not expand `|` block scalars.
    # See skills/public/critique/references/adapter-contract.md.
    content:
      - "- Charness does not classify section roles (source/derived/audit-only/rewrite). Roles stay consumer-defined."
      - "- Charness does not enforce packet content correctness — the validator owns shape only."
      - "- Retro owns its own prepare-packet slot through retro-adapter.yaml packet_sections; critique packets do not substitute for retro lesson judgment."
