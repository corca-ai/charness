version: 1
repo: charness
language: en
output_dir: charness-artifacts/release
preset_id: portable-defaults
customized_from: portable-defaults
package_id: charness
packaging_manifest_path: packaging/charness.json
checked_in_plugin_root: plugins/charness
sync_command: python3 scripts/sync_root_plugin_manifests.py --repo-root .
quality_command: ./scripts/run-quality.sh --release
post_publish_install_refresh: charness update
product_surfaces:
- installable_cli
- bundled_skill
cli_skill_surface_probe_commands:
- ./charness --help
- ./charness doctor --help
- ./charness --version
- python3 scripts/doctor.py --repo-root . --json --skip-release-probe
cli_skill_surface_command_docs:
- .agents/command-docs.yaml
cli_skill_surface_change_globs:
- charness
- scripts/**
- skills/public/**
- skills/support/**
- plugins/**
- .claude-plugin/**
- .agents/plugins/**
- packaging/**
- .agents/command-docs.yaml
update_instructions:
- Run `charness update` to install the latest published Charness release.
- Read the GitHub release notes for release-specific behavior changes, migrations, or rollback notes.
real_host_required_surfaces:
- integrations-and-control-plane
real_host_required_path_globs:
- README.md
- docs/host-packaging.md
- integrations/tools/**
- scripts/doctor.py
- scripts/doctor_lib.py
- scripts/install_provenance_lib.py
- scripts/install_tools.py
- scripts/support_sync_lib.py
- scripts/sync_support.py
- scripts/update_tools.py
real_host_checklist:
- On THIS maintainer/dev machine, run `charness update` after publish so the installed plugin at `~/.agents/src/charness` stays `== repo`, then re-verify with `charness doctor` (or `python3 scripts/doctor.py --repo-root . --json`) and a cited-check == repo-gate spot check; record the `charness update` output as executed proof. This closes the installed-vs-repo version-skew class.
- Run `charness tool doctor nose --json --no-write-locks` before installing `nose` and confirm missing `nose` reports `doctor_disposition: advisory-install-needed`, not a blocking install failure.
- Run `charness tool install nose --dry-run --json` and confirm it points at the upstream `nose-cli-installer.sh` release path and latest `v0.4.0` or newer metadata.
- Install `nose` through the manifest-supported path (`charness tool install nose --json`, the upstream release installer, or `brew install corca-ai/tap/nose`), then verify `nose --version`.
- Re-run `charness tool doctor nose --json --no-write-locks` and confirm the binary is detected on PATH.
- Run `charness tool sync-support nose --json` and confirm it reports no materialized support skill requirement; `nose` is an integration-only validation binary consumed by the public `quality` skill.
- Run `python3 skills/public/quality/scripts/inventory_nose_clones.py --repo-root . --json` once with `nose` available and confirm findings, if any, are advisory refactoring candidates rather than standing quality failures.
fresh_checkout_probes:
- ./charness --help >/dev/null
- ./charness goal check --help >/dev/null
- python3 scripts/doctor.py --repo-root . --json --skip-release-probe >/dev/null
requested_review_commands: []
requested_review_policy: advisory-only
review_unavailable_patterns:
- review unavailable
- requested review unavailable
- review gate unavailable
- review skipped because
- executor_variants
- no executor_variants
review_waiver_phrases:
- 'review waiver:'
- 'explicit review waiver:'
- 'requested review waiver:'
