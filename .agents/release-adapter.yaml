version: 1
repo: charness
language: en
output_dir: charness-artifacts/release
preset_id: portable-defaults
customized_from: portable-defaults
package_id: charness
packaging_manifest_path: packaging/charness.json
checked_in_plugin_root: plugins/charness
sync_command: python3 scripts/sync_root_plugin_manifests.py --repo-root .
quality_command: ./scripts/run-quality.sh --release
product_surfaces:
- installable_cli
- bundled_skill
cli_skill_surface_probe_commands:
- ./charness --help
- ./charness doctor --help
- ./charness --version
- python3 scripts/doctor.py --repo-root . --json --skip-release-probe
cli_skill_surface_command_docs:
- .agents/command-docs.yaml
cli_skill_surface_change_globs:
- charness
- scripts/**
- skills/public/**
- skills/support/**
- plugins/**
- .claude-plugin/**
- .agents/plugins/**
- packaging/**
- .agents/command-docs.yaml
update_instructions:
- Run `charness update` to pull 0.12.0 (handoff chunker v2 - live-backlog input + bare-invocation trigger + #248 stage-script ergonomics).
- Restart Claude Code or Codex if the host cache still shows the previous version.
- BEHAVIOR CHANGE - 0.12.0 turns the handoff chunker's issue source ON by default. At a bare `/handoff` pickup the chunker unions your LIVE open-issue backlog by shelling out to the resolved issue provider (e.g. `gh issue list`); any provider failure degrades safely to doc-only chunking. To opt out, set `issue_source: {enabled: false}` in your handoff adapter (`.agents/handoff-adapter.yaml`). Exercised live only against `gh`; non-gh backends use the adapter `issue_backend.commands.list_open` override and are not yet proven on a live non-gh host.
- Carried from 0.11.0 (still applies) - session-start find-skills routing is NOT auto-wired; manually add a user-level SessionStart hook pointing at the installed plugin's `scripts/session_start_find_skills.py` (Claude `~/.claude/settings.json`, Codex `~/.codex/config.toml`). #244 tracks auto-wiring.
real_host_required_surfaces:
- integrations-and-control-plane
real_host_required_path_globs:
- README.md
- docs/host-packaging.md
- integrations/tools/**
- scripts/doctor.py
- scripts/doctor_lib.py
- scripts/install_provenance_lib.py
- scripts/install_tools.py
- scripts/support_sync_lib.py
- scripts/sync_support.py
- scripts/update_tools.py
real_host_checklist:
- On a second machine or a clean temp-home, refresh `charness` through the published operator path before claiming the release surface is ready.
- Run `charness tool doctor cautilus --json` before installing `cautilus` and confirm the missing-binary state still surfaces an install document URL instead of a guessed package-manager command.
- Follow the official Cautilus install script at `https://github.com/corca-ai/cautilus/blob/main/install.sh`, then verify `cautilus --version` and `cautilus version --verbose`.
- Re-run `charness tool doctor cautilus --json` and confirm the binary is detected on PATH.
- Run `charness tool sync-support cautilus --json`, then confirm the generated support surface exists and the doctor payload reports support as materialized.
requested_review_commands: []
review_unavailable_patterns:
- review unavailable
- requested review unavailable
- review gate unavailable
- review skipped because
- executor_variants
- no executor_variants
review_waiver_phrases:
- 'review waiver:'
- 'explicit review waiver:'
- 'requested review waiver:'
