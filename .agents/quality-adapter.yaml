version: 1
repo: charness
language: en
output_dir: charness-artifacts/quality
preset_id: python-quality
customized_from: python-quality
preset_lineage:
  - python-quality
  - specdown-quality
coverage_fragile_margin_pp: 1.0
coverage_floor_policy:
  min_statements_threshold: 30
  fail_below_pct: 85.0
  warn_ceiling_pct: 95.0
  floor_drift_lock_pp: 1.0
  exemption_list_path: scripts/coverage-floor-exemptions.txt
  gate_script_pattern: scripts/check_coverage.py
  lefthook_path: lefthook.yml
  ci_workflow_glob: .github/workflows/*.yml
specdown_smoke_patterns:
  - "\\bgrep\\s+-q\\b"
  - "\\[pycheck\\]"
  - "\\b(?:uv\\s+run\\s+)?python\\s+-m\\s+pytest\\b"
  - "\\bpytest\\b.*\\s+-k\\s+"
spec_pytest_reference_format: "Covered by pytest:\\s+`tests/[^`]+`(?:,\\s*`tests/[^`]+`)*"
recommendation_defaults_version: issue-64
public_spec_section_exemptions:
  - Fixed Decisions
  - HTTP API contract
  - Server backend stack
  - Deferred Decisions
  - Non-Goals
public_spec_implementation_ref_density_floor: 0.02
public_spec_implementation_guard_min_lines: 100
public_spec_pointer_proof_markers:
  - "proof: pointer"
  - "proof: pointer-spec"
  - "executable_proof: pointer"
  - "public_spec_proof: pointer"
prompt_asset_roots: []
adapter_review_sources:
  - .agents/quality-adapter.yaml
  - skills/public/quality/references/adapter-contract.md
acknowledged_recommendations: []
gate_design_review_globs:
  - .agents/*-adapter.yaml
  - skills/public/*/adapter.example.yaml
  - scripts/*.py
product_surfaces:
  - installable_cli
  - bundled_skill
cli_skill_surface_probe_commands:
  - ./charness --help
  - ./charness doctor --help
  - ./charness --version
  - env CHARNESS_AGENT_BROWSER_IGNORE_ORPHANS=1 python3 scripts/doctor.py --repo-root . --json --skip-release-probe
cli_skill_surface_command_docs:
  - .agents/command-docs.yaml
cli_skill_surface_change_globs:
  - charness
  - scripts/**
  - skills/public/**
  - skills/shared/**
  - skills/support/**
  - plugins/**
  - .claude-plugin/**
  - .agents/plugins/**
  - packaging/**
  - .agents/command-docs.yaml
canonical_markdown_surfaces:
  - AGENTS.md
  - CLAUDE.md
  - docs/handoff.md
prompt_asset_policy:
  source_globs:
    - scripts/**/*.py
    - skills/**/*.py
    - tests/**/*.py
  min_multiline_chars: 400
  exemption_globs:
    - plugins/**
    - skills/shared/references/success-criteria-review.md
    - .artifacts/**
domain_language_contract:
  surface_globs:
    - README.md
    - docs/**/*.md
    - skills/public/**/*.md
    - skills/shared/**/*.md
    - charness
    - scripts/**/*.py
  exemption_globs:
    - skills/public/quality/references/adapter-contract.md
  terms:
    - id: external-tool-cli
      canonical: charness tool
      deprecated_aliases:
        - charness install <tool>
        - charness sync-support
        - charness update-tools
    - id: support-capability-taxonomy
      canonical: support capability
      allowed_aliases:
        - support skill
        - integration manifest
        - integration
    - id: repo-initialization-skill
      canonical: setup
      allowed_aliases:
        - initialize this repo
        - repo initialization
skill_ergonomics_gate_rules:
  - dated_incident_in_core
  - long_core
  - issue_anchor_in_core
  - mode_option_pressure_terms
  - portable_package_dated_incident
  - portable_package_issue_anchor
  - progressive_disclosure_risk
  - code_fence_without_helper_script
  - portable_helper_path_ambiguity
runtime_profile_default: default
runtime_budgets:
  charness-version: 500
  check-cli-skill-surface: 11000
  pytest: 70000
  check-coverage: 15000
  check-doc-near-duplicates: 13000
  check-markdown: 11000
  check-secrets: 6000
  run-evals: 6500
  specdown: 10500
runtime_budget_profiles:
  local-linux-x86_64-36cpu:
    budgets:
      charness-version: 500
      check-cli-skill-surface: 11000
      check-inventory-declaration-coverage: 500
      check-references-link-inventory: 1500
      check-seed-fixture-budget: 5000
      check-spec-evidence-durability: 2500
      inventory-ci-local-gate-parity: 500
      inventory-sloc: 1000
      inventory-ubiquitous-language: 1200
      pytest: 140000
      check-coverage: 45000
      check-doc-near-duplicates: 13000
      check-markdown: 11000
      check-secrets: 6000
      run-evals: 6500
      specdown: 10500
      validate-cautilus-call-provenance: 500
      validate-inventory-consumption-declaration: 35000
  local-linux-aarch64-4cpu:
    # Budgets set above this machine's measured median_recent/max_recent so the
    # gate is honest for the slower 4-CPU aarch64 box (same key scope as the
    # x86_64 profile; values derived from runtime-signals.json this turn).
    budgets:
      charness-version: 1000
      check-cli-skill-surface: 15000
      check-inventory-declaration-coverage: 1500
      check-references-link-inventory: 2500
      check-seed-fixture-budget: 5000
      check-spec-evidence-durability: 5000
      inventory-ci-local-gate-parity: 1000
      inventory-sloc: 1500
      inventory-ubiquitous-language: 2500
      pytest: 110000
      check-coverage: 60000
      check-doc-near-duplicates: 24000
      check-markdown: 15000
      check-secrets: 8000
      run-evals: 8000
      specdown: 13000
      validate-cautilus-call-provenance: 1500
      validate-inventory-consumption-declaration: 12000
startup_probes:
  - label: charness-version
    command:
      - python3
      - charness
      - "--version"
    class: standing
    startup_mode: warm
    surface: direct
    samples: 3
quality_phases:
  - label: inventory-sloc
    writes_git_tracked_artifact: true
concept_paths:
  - docs/control-plane.md
  - docs/public-skill-validation.md
  - docs/operator-acceptance.md
  - docs/handoff.md
  - charness-artifacts/quality/latest.md
  - README.md
preflight_commands:
  - python3 scripts/validate_maintainer_setup.py --repo-root .
  - python3 scripts/doctor.py --json
gate_commands:
  - ./scripts/run-quality.sh
review_commands:
  - ./scripts/run-quality.sh --review
security_commands:
  - ./scripts/check-secrets.sh
  - python3 scripts/check_supply_chain.py --repo-root .

# >>> mutation_testing (charness propose) >>>
mutation_testing:
  commands:
    dry_run: "python3 scripts/run_cosmic_ray_mutation.py --repo-root . --mode dry-run && npm run test:mutation:js:dry-run"
    full: "python3 scripts/run_cosmic_ray_mutation.py --repo-root . --mode full && npm run test:mutation:js"
    sample: "python3 scripts/sample_mutation_files.py --repo-root ."
    summary: "python3 scripts/check_mutation_suite_score.py --repo-root ."
  score_break: 80
  schedule_cron: "17 */3 * * *"
  changed_quota: 5
  max_files: 5
  max_executable_mutants: 120
  max_executable_mutants_per_file: 80
  max_test_nodeids: 40
  auto_issue:
    enabled: true
    label: mutation-test
    title: Mutation test regression on main
    marker_token: mutation-test-regression
  workflow_path: .github/workflows/mutation-tests.yml
  report_paths:
    summary_md: reports/mutation/summary.md
    sample_md: reports/mutation/sample.md
    log: reports/mutation/run.log
  declined: false
# <<< mutation_testing (charness propose) <<<
standing_doc_provenance:
  # Dogfood the provenance-placement policy (#325). standing_docs are the
  # timeless rule docs; tracking ledgers and per-goal specs / dated
  # dispositions stay out. See docs/conventions/provenance-placement.md.
  standing_docs:
    - docs/conventions/operating-contract.md
    - docs/conventions/implementation-discipline.md
    - docs/conventions/authoring-preflight.md
    - docs/conventions/provenance-placement.md
    - docs/prescribed-skill-closeout-contract.md
  tracking_allowlist:
    - docs/support-tool-followup.md
    - docs/deferred-decisions.md
    - docs/product-success-metrics.md
    - docs/artifact-policy.md
  inline_allow_marker: provenance-allow
changed_line_mutation_gate:
  # Portable changed-line coverage gate (handoff-3). Dogfood config: the eligible
  # globs mirror the mutation pool; coverage_json is the report the closeout
  # producer emits. charness's active pre-push gate stays the cosmic-ray-coupled
  # scripts/check_changed_line_mutation_coverage.py; this block proves the
  # portable quality capability resolves the same surface. See
  # skills/public/quality/references/mutation-testing.md.
  coverage_json: reports/mutation/test-coverage.json
  eligible_globs:
    - scripts/**/*.py
    - skills/public/**/*.py
    - skills/support/**/*.py
  exclude_globs:
    - "**/tests/**"
