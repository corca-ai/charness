version: 1
commands:
  root:
    help_command: ./charness --help
    doc_paths:
      - README.md
      - docs/cli-reference.md
    required_help_contains:
      - init
      - doctor
      - update
      - version
      - reset
      - uninstall
      - task
      - capability
      - tool
    required_doc_contains:
      - The CLI is there so humans and agents can inspect local harness state instead of guessing.
      - charness --help
      - charness doctor
      - charness update
      - CLI Reference
  task:
    help_command: ./charness task --help
    doc_paths:
      - docs/agent-task-envelope.md
      - docs/cli-reference.md
    required_help_contains:
      - claim
      - submit
      - abort
      - status
      - --json
      - --repo-root
    required_doc_contains:
      - charness task claim slice-1
      - charness task submit slice-1
      - charness task abort slice-1
      - .charness/tasks/
  init:
    help_command: ./charness init --help
    doc_paths:
      - README.md
      - docs/cli-reference.md
    required_help_contains:
      - --skip-cli-install
      - --skip-claude-wrapper
      - --json
    required_doc_contains:
      - Make sure your machine has Python 3.
      - /tmp/charness-init.sh
      - Use charness to initialize this repo.
      - charness init
  doctor:
    help_command: ./charness doctor --help
    doc_paths:
      - README.md
      - docs/cli-reference.md
    required_help_contains:
      - --write-state
      - --next-action
      - --json
    required_doc_contains:
      - charness doctor
      - --next-action
      - --json
  update:
    help_command: ./charness update --help
    doc_paths:
      - README.md
      - docs/cli-reference.md
    required_help_contains:
      - --no-pull
      - --skip-codex-cache-refresh
      - --json
    required_doc_contains:
      - charness update
      - charness update all
      - Refresh the installed surface
  reset:
    help_command: ./charness reset --help
    doc_paths:
      - docs/cli-reference.md
    required_help_contains:
      - --json
    required_doc_contains:
      - charness reset
      - Remove host plugin state for Codex and Claude while preserving the managed checkout and CLI.
  uninstall:
    help_command: ./charness uninstall --help
    doc_paths:
      - docs/cli-reference.md
    required_help_contains:
      - --delete-checkout
      - --delete-cli
      - --json
    required_doc_contains:
      - charness uninstall
      - Remove the managed local install surface.
  capability:
    help_command: ./charness capability --help
    doc_paths:
      - docs/cli-reference.md
      - docs/capability-resolution.md
    required_help_contains:
      - init
      - resolve
      - doctor
      - env
      - explain
    required_doc_contains:
      - charness capability init
      - charness capability resolve slack.default
      - charness capability doctor slack.default
      - Machine-local capability config
  tool:
    help_command: ./charness tool --help
    doc_paths:
      - docs/cli-reference.md
      - docs/control-plane.md
    required_help_contains:
      - doctor
      - sync-support
      - install
      - update
    required_doc_contains:
      - charness tool doctor cautilus
      - charness tool install cautilus
      - charness tool install --recommendation-role validation --next-skill-id quality
      - charness tool update agent-browser
      - charness tool sync-support cautilus
      - persist manual install guidance
