version: 1
commands:
  root:
    help_command: ./charness --help
    doc_paths:
      - README.md
      - docs/generated/cli-reference.md
    required_help_contains:
      - init
      - doctor
      - update
      - version
      - reset
      - uninstall
      - task
      - capability
      - goal
      - tool
      - worktree
    required_doc_contains:
      - The CLI is there so humans and agents can inspect local harness state instead of guessing.
      - charness --help
      - charness doctor
      - charness update
      - CLI Reference
  task:
    help_command: ./charness task --help
    doc_paths:
      - docs/agent-task-envelope.md
      - docs/generated/cli-reference.md
    required_help_contains:
      - claim
      - submit
      - abort
      - status
      - --json
      - --repo-root
    required_doc_contains:
      - charness task claim slice-1
      - charness task submit slice-1
      - charness task abort slice-1
      - .charness/tasks/
  init:
    help_command: ./charness init --help
    doc_paths:
      - README.md
      - docs/generated/cli-reference.md
    required_help_contains:
      - --skip-cli-install
      - --skip-claude-wrapper
      - --json
    required_doc_contains:
      - Make sure your machine has Python 3.
      - /tmp/charness-init.sh
      - charness init
    forbidden_doc_contains:
      - charness setup
  doctor:
    help_command: ./charness doctor --help
    doc_paths:
      - README.md
      - docs/generated/cli-reference.md
    required_help_contains:
      - --write-state
      - --next-action
      - --json
    required_doc_contains:
      - charness doctor
      - --next-action
      - --json
  update:
    help_command: ./charness update --help
    doc_paths:
      - README.md
      - docs/generated/cli-reference.md
    required_help_contains:
      - --no-pull
      - --skip-codex-cache-refresh
      - --json
    required_doc_contains:
      - charness update
      - charness update all
      - Refresh the installed surface
  reset:
    help_command: ./charness reset --help
    doc_paths:
      - docs/generated/cli-reference.md
    required_help_contains:
      - --json
    required_doc_contains:
      - charness reset
      - Remove host plugin state for Codex and Claude while preserving the managed checkout and CLI.
  uninstall:
    help_command: ./charness uninstall --help
    doc_paths:
      - docs/generated/cli-reference.md
    required_help_contains:
      - --delete-checkout
      - --delete-cli
      - --json
    required_doc_contains:
      - charness uninstall
      - Remove the managed local install surface.
  capability:
    help_command: ./charness capability --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/capability-resolution.md
    required_help_contains:
      - init
      - resolve
      - doctor
      - env
      - explain
    required_doc_contains:
      - charness capability init
      - charness capability resolve slack.default
      - charness capability doctor slack.default
      - repo-local capability config
  tool:
    help_command: ./charness tool --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/control-plane.md
      - docs/external-integrations.md
      - docs/handoff.md
    required_help_contains:
      - doctor
      - sync-support
      - install
      - update
    required_doc_contains:
      - charness tool doctor cautilus
      - charness tool install cautilus
      - charness tool install --recommendation-role validation --next-skill-id quality
      - charness tool update agent-browser
      - charness tool sync-support cautilus
      - persist manual install guidance
    forbidden_doc_contains:
      - charness install <tool>
      - charness sync-support
      - charness update-tools
  goal:
    help_command: ./charness goal --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/development.md
    required_help_contains:
      - check
    required_doc_contains:
      - charness goal check
      - stable goal helper commands
  goal-check:
    help_command: ./charness goal check --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/development.md
    required_help_contains:
      - --goal-path
      - --pursue-ready
      - --charness-checkout
    required_doc_contains:
      - charness goal check
      - --charness-checkout
      - versioned plugin-cache paths
  task-claim:
    help_command: ./charness task claim --help
    doc_paths:
      - docs/generated/cli-reference.md
    required_help_contains:
      - --summary
      - --agent
    required_doc_contains:
      - charness task claim
  task-submit:
    help_command: ./charness task submit --help
    doc_paths:
      - docs/generated/cli-reference.md
    required_help_contains:
      - --summary
      - --artifact
    required_doc_contains:
      - charness task submit
  task-abort:
    help_command: ./charness task abort --help
    doc_paths:
      - docs/generated/cli-reference.md
    required_help_contains:
      - --reason
    required_doc_contains:
      - charness task abort
  task-status:
    help_command: ./charness task status --help
    doc_paths:
      - docs/generated/cli-reference.md
    required_help_contains:
      - task_id
    required_doc_contains:
      - charness task status
  capability-init:
    help_command: ./charness capability init --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/capability-resolution.md
    required_help_contains:
      - --force
      - --target-repo-root
    required_doc_contains:
      - charness capability init
  capability-resolve:
    help_command: ./charness capability resolve --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/capability-resolution.md
    required_help_contains:
      - logical_id
      - --target-repo-root
    required_doc_contains:
      - charness capability resolve slack.default
  capability-doctor:
    help_command: ./charness capability doctor --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/capability-resolution.md
    required_help_contains:
      - logical_id
      - --json
    required_doc_contains:
      - charness capability doctor slack.default
  capability-env:
    help_command: ./charness capability env --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/capability-resolution.md
    required_help_contains:
      - logical_id
      - --json
    required_doc_contains:
      - charness capability env slack.default
  capability-explain:
    help_command: ./charness capability explain --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/capability-resolution.md
    required_help_contains:
      - skill_id
      - --json
    required_doc_contains:
      - charness capability explain gather
  tool-doctor:
    help_command: ./charness tool doctor --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/control-plane.md
    required_help_contains:
      - --no-write-locks
      - tool_ids
    required_doc_contains:
      - charness tool doctor cautilus
  tool-sync-support:
    help_command: ./charness tool sync-support --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/control-plane.md
    required_help_contains:
      - --upstream-checkout
      - --dry-run
    required_doc_contains:
      - charness tool sync-support cautilus
  tool-install:
    help_command: ./charness tool install --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/control-plane.md
    required_help_contains:
      - --recommendation-role
      - --next-skill-id
    required_doc_contains:
      - charness tool install --recommendation-role validation --next-skill-id quality
  tool-update:
    help_command: ./charness tool update --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/control-plane.md
    required_help_contains:
      - --skip-sync-support
      - tool_ids
    required_doc_contains:
      - charness tool update agent-browser
  worktree:
    help_command: ./charness worktree --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/worktree-prepare.md
    required_help_contains:
      - create
      - add
      - doctor
      - prepare
      - audit
      - cleanup
    required_doc_contains:
      - charness worktree create
      - charness worktree doctor
      - charness worktree prepare
      - charness worktree audit --doctor
      - charness worktree cleanup
      - .agents/worktree-adapter.yaml
  worktree-create:
    help_command: ./charness worktree create --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/worktree-prepare.md
    required_help_contains:
      - --path
      - --branch
      - --prepare
      - --json
    required_doc_contains:
      - charness worktree create --path
  worktree-add:
    help_command: ./charness worktree add --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/worktree-prepare.md
    required_help_contains:
      - --path
      - --branch
      - --prepare
      - --json
    required_doc_contains:
      - charness worktree add --path
  worktree-doctor:
    help_command: ./charness worktree doctor --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/worktree-prepare.md
    required_help_contains:
      - --repo-root
      - --json
    required_doc_contains:
      - charness worktree doctor
  worktree-prepare:
    help_command: ./charness worktree prepare --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/worktree-prepare.md
    required_help_contains:
      - --repo-root
      - --force
      - --json
    required_doc_contains:
      - charness worktree prepare
  worktree-audit:
    help_command: ./charness worktree audit --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/worktree-prepare.md
    required_help_contains:
      - --repo-root
      - --doctor
      - --json
    required_doc_contains:
      - charness worktree audit --doctor
  worktree-cleanup:
    help_command: ./charness worktree cleanup --help
    doc_paths:
      - docs/generated/cli-reference.md
      - docs/worktree-prepare.md
    required_help_contains:
      - --path
      - --delete-merged-branch
      - --yes
      - --json
    required_doc_contains:
      - charness worktree cleanup --path
