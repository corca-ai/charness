[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "ci_only: covered in CI or on-demand runs, excluded from the standing pre-push gate",
]

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = ["charness-artifacts", ".charness"]

[tool.ruff.lint]
select = ["E", "F", "I", "C90"]
ignore = ["E501"]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.vulture]
paths = ["runtime_bootstrap.py", "skill_runtime_bootstrap.py", "scripts", "skills", "tests"]
min_confidence = 80
sort_by_size = true
