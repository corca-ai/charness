[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "release_only: excluded from standing pre-push but included in full local release/update quality gates",
]

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = ["charness-artifacts", ".charness"]

[tool.ruff.lint]
select = ["E", "F", "I", "C90"]
ignore = ["E501"]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.vulture]
paths = ["runtime_bootstrap.py", "skill_runtime_bootstrap.py", "scripts", "skills", "tests"]
min_confidence = 80
sort_by_size = true

[tool.mutmut]
paths_to_mutate = ["scripts/control_plane_lib.py"]
tests_dir = ["tests/control_plane/test_control_plane_lib_helpers.py"]
also_copy = [
    "scripts",
    "skills",
    "packaging",
    "integrations",
    "plugins",
    "runtime_bootstrap.py",
    "skill_runtime_bootstrap.py",
    "charness",
    "AGENTS.md",
    "CLAUDE.md",
    ".agents",
    ".charness-marketplace.json",
    ".claude-plugin",
]
