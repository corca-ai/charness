[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "ci_only: covered in CI or on-demand runs, excluded from the standing pre-push gate",
]

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = ["charness-artifacts", ".charness"]

[tool.ruff.lint]
select = ["E", "F", "I", "C90"]
ignore = ["E501"]

[tool.ruff.lint.mccabe]
max-complexity = 15
