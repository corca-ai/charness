[tool.pytest.ini_options]
testpaths = ["tests"]
# Put the repo root and scripts/ on sys.path for the test session so test
# modules import `scripts.x` / bare `host_hook_*` at the top instead of each
# file re-doing a `sys.path.insert(...)` bootstrap (which forced `# noqa: E402`).
# Caution: with scripts/ on the path, a scripts/<stdlib-name>.py would shadow
# that stdlib module during tests — keep script basenames non-colliding.
pythonpath = [".", "scripts"]
tmp_path_retention_count = 1
tmp_path_retention_policy = "failed"
markers = [
  "release_only: excluded from standing pre-push but included in full local release/update quality gates",
]

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = ["charness-artifacts", ".charness"]

[tool.ruff.lint]
select = ["E", "F", "I", "C90"]
ignore = ["E501"]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.vulture]
paths = ["runtime_bootstrap.py", "skill_runtime_bootstrap.py", "scripts", "skills", "tests"]
min_confidence = 80
sort_by_size = true
