[tool.pytest.ini_options]
testpaths = ["tests"]
tmp_path_retention_count = 1
tmp_path_retention_policy = "failed"
markers = [
  "release_only: excluded from standing pre-push but included in full local release/update quality gates",
]

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = ["charness-artifacts", ".charness"]

[tool.ruff.lint]
select = ["E", "F", "I", "C90"]
ignore = ["E501"]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.vulture]
paths = ["runtime_bootstrap.py", "skill_runtime_bootstrap.py", "scripts", "skills", "tests"]
min_confidence = 80
sort_by_size = true
